<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tarot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="title">Tarot</h1>

    <div class="spread-selector">
      <button class="spread-btn" data-spread="one">One Card</button>
      <button class="spread-btn active" data-spread="ppf">Past · Present · Future</button>
      <button class="spread-btn" data-spread="sao">Situation · Action · Outcome</button>
      <button class="spread-btn" data-spread="opt">Three Options</button>
    </div>

    <div class="cards-area">
      <div class="card-slot">
        <div class="card-label"></div>
        <div class="card">
          <div class="card-inner">
            <div class="card-back"></div>
            <div class="card-face"></div>
          </div>
        </div>
      </div>
      <div class="card-slot">
        <div class="card-label"></div>
        <div class="card">
          <div class="card-inner">
            <div class="card-back"></div>
            <div class="card-face"></div>
          </div>
        </div>
      </div>
      <div class="card-slot">
        <div class="card-label"></div>
        <div class="card">
          <div class="card-inner">
            <div class="card-back"></div>
            <div class="card-face"></div>
          </div>
        </div>
      </div>
    </div>

    <button class="deal-btn" id="deal-btn">Draw Cards</button>
  </main>

  <script src="app.js"></script>
</body>
</html>
